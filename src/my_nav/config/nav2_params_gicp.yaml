bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 10.0
    transform_tolerance: 1.0     # <--- 新增这一行！
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 8.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 3.14

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 20
      model_dt: 0.1
      batch_size: 1000
      vx_std: 0.18
      vy_std: 0.0
      wz_std: 0.35
      vx_max: 0.5
      vx_min: 0.0
      vy_max: 0.0
      wz_max: 0.75
      ax_max: 0.8
      ax_min: -1.8
      ay_min: 0.0
      ay_max: 0.0
      az_max: 2.4
      iteration_count: 1
      prune_distance: 1.5
      transform_tolerance: 0.8
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      diff_drive:
        plugin: "mppi::DiffDriveMotionModel"
      visualize: false
      reset_period: 1.0
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 1.5
        consider_footprint: true
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        critical_cost: 200.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 0.7
        trajectory_point_step: 2
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 12
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 7.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        threshold_to_consider: 0.5

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: False
      transform_tolerance: 1.0   # <--- 新增这一行！
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[0.35, 0.22], [0.35, -0.22], [-0.35, -0.22], [-0.35, 0.22]]"
      # plugins: ["voxel_layer", "inflation_layer"] 
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 7.0
        inflation_radius: 0.35
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        tf_filter_tolerance: 0.3
        footprint_clearing_enabled: True
        combination_method: 1
        observation_sources: scan
        scan:
          topic: /scan
          min_obstacle_height: -1.0
          max_obstacle_height: 3.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          inf_is_valid: true
          observation_persistence: 0.25
          expected_update_rate: 0.5
          raytrace_max_range: 6.0
          raytrace_min_range: 0.15
          obstacle_max_range: 4.0
          obstacle_min_range: 0.25
      # voxel_layer:
      #   plugin: "nav2_costmap_2d::VoxelLayer"
      #   enabled: True
      #   publish_voxel_map: False
      #   origin_z: -0.1
      #   z_resolution: 0.05
      #   z_voxels: 16
      #   max_obstacle_height: 0.6
      #   mark_threshold: 0
      #   observation_sources: scan
      #   scan:
      #     topic: /scan
      #     max_obstacle_height: 0.6
      #     clearing: True
      #     marking: True
      #     data_type: "LaserScan"
      #     raytrace_max_range: 3.5
      #     raytrace_min_range: 0.2
      #     obstacle_max_range: 6.0
      #     obstacle_min_range: 0.2

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 6.0
      publish_frequency: 3.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: False
      transform_tolerance: 1.0   # <--- 新增这一行！
      rolling_window: false
      resolution: 0.05
      footprint: "[[0.35, 0.22], [0.35, -0.22], [-0.35, -0.22], [-0.35, 0.22]]"
      track_unknown_space: false
      # track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "virtual_obstacle_layer", "inflation_layer"]
      # Global dynamic obstacles are needed when a whole corridor is blocked,
      # otherwise the global planner will keep reusing the static-map route.
      footprint_clearing_enabled: True
      combination_method: 1
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        tf_filter_tolerance: 0.3
        footprint_clearing_enabled: True
        combination_method: 1
        observation_sources: scan
        scan:
          topic: /scan
          sensor_frame: base_link
          min_obstacle_height: -1.0
          max_obstacle_height: 3.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          inf_is_valid: true
          observation_persistence: 0.25
          expected_update_rate: 0.0
          raytrace_max_range: 6.0
          raytrace_min_range: 0.25
          obstacle_max_range: 4.0
          obstacle_min_range: 0.45
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      virtual_obstacle_layer:
        plugin: "my_nav::VirtualObstacleLayer"
        enabled: True
        topic: /blocked_path/virtual_obstacles
        obstacle_radius: 0.12
        obstacle_cost: 254
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 7.0
        inflation_radius: 0.45
      always_send_full_costmap: True

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 1.0
    use_sim_time: False
    simulate_ahead_time: 0.4
    max_rotational_vel: 0.8
    min_rotational_vel: 0.2
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 30.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    min_velocity: [-0.5, 0.0, -1.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.01, 0.0, 0.05]
    velocity_timeout: 1.0
    max_velocity: [0.5, 0.0, 0.7]
    max_accel: [0.9, 0.0, 2.4]
    max_decel: [-2.8, 0.0, -3.4]

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: False
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother

